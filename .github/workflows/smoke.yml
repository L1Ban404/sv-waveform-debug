name: Smoke test

on:
  push:
  pull_request:

jobs:
  portable-vcd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements-dev.txt
      - run: python tests/validate_skill.py
      - run: python -m unittest discover -s tests -p 'test_*.py'
      - run: python tests/test_smoke.py
      - run: python -m py_compile scripts/wave_debug.py scripts/wave_debug_lib/*.py

  fst:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y gtkwave
      - run: vcd2fst tests/fixtures/wave.vcd /tmp/wave.fst
      - run: python scripts/wave_debug.py inspect --workspace tests/fixtures --waveform /tmp/wave.fst --out-dir /tmp/direct --json
      - run: SV_WAVE_DEBUG_DISABLE_PYWELLEN=1 python scripts/wave_debug.py inspect --workspace tests/fixtures --waveform /tmp/wave.fst --out-dir /tmp/fallback --json
